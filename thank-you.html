<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent | B&W Legacy Farms</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    .thankyou {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--green-dark) 0%, #1a3010 100%);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .thankyou-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 500px;
    }
    .thankyou-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .thankyou-box h1 {
      font-family: var(--font-serif);
      color: var(--white);
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    .thankyou-box p { color: rgba(255,255,255,0.75); margin-bottom: 1.75rem; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="thankyou">
    <div class="thankyou-box">
      <div class="thankyou-icon">✅</div>
      <h1>Message Received</h1>
      <p>Thanks for reaching out to B&W Legacy Farms. We'll be in touch with you shortly.</p>
      <a href="index.html" class="btn-primary">Back to Home</a>
    </div>
  </div>
</body>
</html>
